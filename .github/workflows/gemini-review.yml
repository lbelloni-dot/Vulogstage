name: Gemini PR Code Review

# Se déclenche à chaque fois qu'une PR est ouverte ou mise à jour
on:
  pull_request:
    types: [opened, synchronize]

jobs:
  review:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Configurer Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Installer les dépendances
        run: pip install --upgrade google-generativeai requests

      - name: Lancer le script de revue par IA
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }} # Clé à configurer dans les "Secrets" GitHub
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: python scripts/pr_reviewer.py
